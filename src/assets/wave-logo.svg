<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#00D1FF" />
      <stop offset="50%" stopColor="#0084FF" />
      <stop offset="100%" stopColor="#0A2540" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#051d3e"/>
  
  <!-- Wave Spiral - Outer curve -->
  <path d="M 60 50 Q 80 50 80 70 Q 80 100 60 130" fill="none" stroke="url(#waveGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Wave Spiral - Middle curve -->
  <path d="M 75 65 Q 90 65 90 85 Q 90 105 75 125" fill="none" stroke="#00D1FF" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Wave Spiral - Inner curve -->
  <path d="M 85 80 Q 100 80 100 95 Q 100 110 85 120" fill="none" stroke="#33DDFF" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  
  <!-- WAVE Text in white -->
  <text x="115" y="120" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white" letter-spacing="1">WAVE</text>
</svg>
